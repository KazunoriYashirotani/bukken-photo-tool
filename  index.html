<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>物件写真 一括リサイズ・リネームツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #ddd9d0;
    --accent: #2d5a8e;
    --accent-light: #e8f0f8;
    --accent-dark: #1a3d61;
    --text: #1a1a1a;
    --text2: #5a5a5a;
    --text3: #8a8a8a;
    --success: #1a6b3a;
    --success-bg: #e8f5ee;
    --danger: #8b2020;
    --danger-bg: #fdf0f0;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text2);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 480px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--accent);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .slider-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 64px;
    text-align: right;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1rem;
    background: var(--surface);
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .drop-main {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 13px;
    color: var(--text3);
  }

  .status-bar {
    display: none;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .status-bar.normal {
    background: var(--surface2);
    color: var(--text2);
    display: block;
  }

  .status-bar.success {
    background: var(--success-bg);
    color: var(--success);
    display: block;
  }

  .status-bar.error {
    background: var(--danger-bg);
    color: var(--danger);
    display: block;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  .preview-card img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
  }

  .preview-info {
    padding: 6px 8px;
  }

  .preview-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .preview-size {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  .preview-size.saved {
    color: var(--success);
    font-weight: 500;
  }

  .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) { background: var(--border); }

  .progress-bar-wrap {
    display: none;
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }

  footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">ミミライル 業務ツール</div>
    <h1>物件写真 一括リサイズ・リネーム</h1>
    <p class="subtitle">iPhoneで撮影した写真をまとめて圧縮・ファイル名変換できます</p>
  </header>

  <div class="card">
    <div class="card-title">ファイル名の設定</div>
    <div class="grid-2">
      <div>
        <label>日付（例: 26-0510）</label>
        <input type="text" id="dateInput" placeholder="26-0510" />
      </div>
      <div>
        <label>物件名</label>
        <input type="text" id="propName" placeholder="グランコート犬山" />
      </div>
    </div>
    <p style="font-size: 12px; color: var(--text3); margin-top: 10px;">
      出力例：<span id="nameExample" style="color: var(--accent); font-weight: 500;">26-0510_グランコート犬山_01.jpg</span>
    </p>
  </div>

  <div class="card">
    <div class="card-title">圧縮の設定</div>
    <div style="margin-bottom: 14px;">
      <label>最大ファイルサイズ</label>
      <div class="slider-row">
        <input type="range" id="maxSize" min="100" max="1000" value="500" step="50" />
        <span class="slider-val" id="sizeLabel">500 KB</span>
      </div>
    </div>
    <div>
      <label>最大幅（画像の横幅）</label>
      <div class="slider-row">
        <input type="range" id="maxWidth" min="800" max="3000" value="1920" step="100" />
        <span class="slider-val" id="widthLabel">1920 px</span>
      </div>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📁</div>
    <div class="drop-main">ここに画像をドラッグ＆ドロップ</div>
    <div class="drop-sub">またはクリックしてファイルを選択（複数可・フォルダごとも可）</div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" />
  </div>

  <div class="status-bar" id="statusBar"></div>
  <div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar-fill" id="progressFill"></div></div>

  <div class="preview-grid" id="previewGrid"></div>

  <div class="btn-row" id="btnRow" style="display: none;">
    <button class="btn btn-primary" id="processBtn" onclick="processAll()">
      ⚙️ 一括処理する
    </button>
    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadAll()" style="display: none;">
      ⬇️ 全部ダウンロード
    </button>
  </div>

</div>

<footer>
  &copy; 2026 ミミライル — AI業務効率化ツール
</footer>

<script>
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const previewGrid = document.getElementById('previewGrid');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const btnRow = document.getElementById('btnRow');
const statusBar = document.getElementById('statusBar');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const nameExample = document.getElementById('nameExample');
const dateInput = document.getElementById('dateInput');
const propInput = document.getElementById('propName');

let files = [];
let processed = [];

function updateExample() {
  const d = dateInput.value.trim() || '26-0510';
  const p = propInput.value.trim() || '物件名';
  nameExample.textContent = `${d}_${p}_01.jpg`;
}
dateInput.oninput = updateExample;
propInput.oninput = updateExample;

document.getElementById('maxSize').oninput = function() {
  document.getElementById('sizeLabel').textContent = this.value + ' KB';
};
document.getElementById('maxWidth').oninput = function() {
  document.getElementById('widthLabel').textContent = this.value + ' px';
};

dropZone.onclick = () => fileInput.click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
dropZone.ondrop = (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
};
fileInput.onchange = (e) => handleFiles(e.target.files);

function handleFiles(newFiles) {
  const imgs = Array.from(newFiles).filter(f => f.type.startsWith('image/'));
  files = [...files, ...imgs];
  renderPreviews();
  processed = [];
  downloadBtn.style.display = 'none';
  if (files.length > 0) {
    btnRow.style.display = 'flex';
    showStatus(`${files.length} 枚の画像を選択中`, 'normal');
  }
}

function renderPreviews() {
  previewGrid.innerHTML = '';
  files.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `
      <img src="${url}" alt="プレビュー" />
      <div class="preview-info">
        <div class="preview-name" title="${f.name}">${f.name}</div>
        <div class="preview-size">${(f.size / 1024 / 1024).toFixed(1)} MB</div>
      </div>
      <button class="remove-btn" onclick="removeFile(${i})" aria-label="削除">✕</button>
    `;
    previewGrid.appendChild(card);
  });
}

function removeFile(i) {
  files.splice(i, 1);
  renderPreviews();
  processed = [];
  downloadBtn.style.display = 'none';
  if (files.length === 0) {
    btnRow.style.display = 'none';
    statusBar.className = 'status-bar';
  } else {
    showStatus(`${files.length} 枚の画像を選択中`, 'normal');
  }
}

function showStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = 'status-bar ' + type;
}

async function compressImage(file, maxKB, maxW) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      let quality = 0.92;
      const tryCompress = () => {
        canvas.toBlob((blob) => {
          if (blob.size / 1024 <= maxKB || quality < 0.25) {
            resolve(blob);
          } else {
            quality -= 0.07;
            tryCompress();
          }
        }, 'image/jpeg', quality);
      };
      tryCompress();
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function processAll() {
  if (files.length === 0) return;
  const date = dateInput.value.trim() || '26-0510';
  const prop = propInput.value.trim() || '物件名';
  const maxKB = parseInt(document.getElementById('maxSize').value);
  const maxW = parseInt(document.getElementById('maxWidth').value);

  processBtn.disabled = true;
  processed = [];
  previewGrid.innerHTML = '';
  progressWrap.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const pct = Math.round((i / files.length) * 100);
    progressFill.style.width = pct + '%';
    showStatus(`処理中... ${i + 1} / ${files.length} 枚`, 'normal');

    const num = String(i + 1).padStart(2, '0');
    const newName = `${date}_${prop}_${num}.jpg`;
    const blob = await compressImage(files[i], maxKB, maxW);
    if (!blob) continue;
    processed.push({ blob, name: newName, origSize: files[i].size });

    const url = URL.createObjectURL(blob);
    const saved = Math.round((1 - blob.size / files[i].size) * 100);
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `
      <img src="${url}" alt="${newName}" />
      <div class="preview-info">
        <div class="preview-name" title="${newName}">${newName}</div>
        <div class="preview-size saved">${(blob.size / 1024).toFixed(0)} KB（${saved}%削減）</div>
      </div>
    `;
    previewGrid.appendChild(card);
  }

  progressFill.style.width = '100%';
  setTimeout(() => { progressWrap.style.display = 'none'; progressFill.style.width = '0%'; }, 600);

  processBtn.disabled = false;
  downloadBtn.style.display = 'flex';
  showStatus(`✅ 完了！ ${processed.length} 枚を処理しました`, 'success');
}

async function downloadAll() {
  if (processed.length === 0) return;
  showStatus(`ダウンロードを開始します（${processed.length} 枚）`, 'normal');
  for (const item of processed) {
    await new Promise(r => setTimeout(r, 120));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(item.blob);
    a.download = item.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  showStatus(`✅ ${processed.length} 枚のダウンロードを開始しました`, 'success');
}
</script>
</body>
</html>
